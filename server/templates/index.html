<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Governance</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #24292f;
      --muted: #656d76;
      --accent: #0969da;
      --green: #1a7f37;
      --red: #cf222e;
      --yellow: #9a6700;
      --purple: #8250df;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      align-items: center;
      padding: 16px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .add-form input,
    .add-form select,
    .add-form button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .add-form input {
      flex: 1;
      min-width: 180px;
    }

    .add-form button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }

    .add-form button:hover {
      opacity: 0.9;
    }

    .add-form button.btn-validate {
      background: var(--purple);
    }

    .hidden {
      display: none;
    }

    /* ── Section headers ─────────────────────────────────── */

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-top: 16px;
      border-bottom: 2px solid var(--border);
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Category card ───────────────────────────────────── */

    .cat-card {
      margin: 16px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .cat-header:hover {
      background: #eef1f5;
    }

    .cat-name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cat-name .cat-icon {
      font-size: 1.1rem;
    }

    .cat-stats {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .cat-stats .stat-pill {
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.75rem;
    }

    .cat-body {
      padding: 0;
    }

    .cat-body.collapsed {
      display: none;
    }

    .cat-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 18px;
      background: #fafbfc;
      border-bottom: 1px solid #eaecef;
      flex-wrap: wrap;
    }

    /* ── Page row (inside category) ──────────────────────── */

    .page-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid #eaecef;
      font-size: 0.85rem;
    }

    .page-row:last-child {
      border-bottom: none;
    }

    .page-row:hover {
      background: #f9fafb;
    }

    .page-id {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.8rem;
      color: var(--accent);
      min-width: 100px;
      flex-shrink: 0;
    }

    .page-title {
      font-weight: 500;
      min-width: 160px;
      flex: 1;
    }

    .page-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ── Validation card ─────────────────────────────────── */

    .val-card {
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .val-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .val-body {
      padding: 14px 18px;
    }

    /* ── Shared UI atoms ─────────────────────────────────── */

    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-pending {
      background: #ddf4ff;
      color: var(--accent);
    }

    .status-ingesting {
      background: #fff8c5;
      color: var(--yellow);
    }

    .status-ingested {
      background: #dafbe1;
      color: var(--green);
    }

    .status-validating {
      background: #f3e8ff;
      color: var(--purple);
    }

    .status-validated {
      background: #dafbe1;
      color: var(--green);
    }

    .status-error {
      background: #ffebe9;
      color: var(--red);
    }

    .status-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .btn-sm {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 0.78rem;
      text-decoration: none;
      color: var(--text);
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: var(--surface);
    }

    .btn-sm.danger {
      color: var(--red);
      border-color: var(--red);
    }

    .btn-sm.danger:hover {
      background: #ffebe9;
    }

    .btn-sm.purple {
      color: var(--purple);
      border-color: var(--purple);
    }

    .btn-sm.purple:hover {
      background: #f3e8ff;
    }

    .btn-sm.accent {
      color: var(--accent);
      border-color: var(--accent);
    }

    .btn-sm.accent:hover {
      background: #ddf4ff;
    }

    .cmd {
      display: inline-block;
      margin-top: 4px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.78rem;
      background: #f3e8ff;
      border: 1px solid #d8b4fe;
      color: var(--purple);
      max-width: 480px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cmd:hover {
      background: #ede5ff;
    }

    .cmd.copied {
      background: #dafbe1;
      border-color: var(--green);
      color: var(--green);
    }

    .rules-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 2px;
    }

    .sev-C {
      background: #ffebe9;
      color: var(--red);
    }

    .sev-H {
      background: #fff1e5;
      color: #bc4c00;
    }

    .sev-M {
      background: #fff8c5;
      color: var(--yellow);
    }

    .sev-L {
      background: #ddf4ff;
      color: var(--accent);
    }

    .error-msg {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .label {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stale-banner {
      margin-top: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      background: #fff8c5;
      border: 1px solid #d4a72c;
      color: #7c5e00;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Progress log ────────────────────────────────────── */

    .progress-log {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      max-height: 260px;
      overflow-y: auto;
    }

    .progress-log .log-entry {
      white-space: pre-wrap;
    }

    .progress-log .log-entry.sub-agent {
      padding-left: 16px;
      border-left: 2px solid #45475a;
      margin-left: 4px;
    }

    .log-icon-complete {
      color: #a6e3a1;
    }

    .log-icon-start {
      color: #f9e2af;
    }

    .log-icon-error {
      color: #f38ba8;
    }

    .log-waiting {
      color: #6c7086;
      font-style: italic;
    }

    .log-detail {
      color: #6c7086;
      font-size: 0.68rem;
      padding-left: 18px;
    }

    .log-output {
      margin: 4px 0 6px 18px;
      font-size: 0.72rem;
    }

    .log-output summary {
      cursor: pointer;
      color: var(--accent, #1976d2);
      font-size: 0.72rem;
      user-select: none;
    }

    .log-output summary:hover {
      text-decoration: underline;
    }

    .log-output-content {
      background: var(--bg-secondary, #f6f8fa);
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 8px 10px;
      margin-top: 4px;
      font-size: 0.7rem;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .agent-badge {
      display: inline-block;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-right: 4px;
    }

    .agent-badge.patterns {
      background: #1e3a5f;
      color: #89b4fa;
    }

    .agent-badge.standards {
      background: #1e3b2e;
      color: #a6e3a1;
    }

    .agent-badge.security {
      background: #3b1e2e;
      color: #f38ba8;
    }

    .agent-badge.governance {
      background: #2e2640;
      color: #cba6f7;
    }

    .log-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #f9e2af;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Score card ───────────────────────────────────────── */

    .score-card {
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .score-overall {
      font-size: 1.4rem;
      font-weight: 700;
      display: inline-block;
      padding: 2px 12px;
      border-radius: 6px;
      margin-right: 10px;
    }

    .score-pass {
      background: #dafbe1;
      color: var(--green);
    }

    .score-fail {
      background: #ffebe9;
      color: var(--red);
    }

    .score-pills {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .score-pill {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ── Modal overlay ───────────────────────────────────── */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #f9fafb;
      border-radius: 14px;
      width: 92vw;
      max-width: 1080px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--surface);
      color: var(--text);
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text);
    }

    .modal-body>.report-root {
      margin: -24px;
    }

    .modal-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }

    .modal-body th,
    .modal-body td {
      border: 1px solid #d0d7de;
      padding: 10px 14px;
      text-align: left;
    }

    .modal-body th {
      background: #f6f8fa;
      font-weight: 600;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #656d76;
    }

    .modal-body tr:nth-child(even) {
      background: #f9fafb;
    }

    .modal-body code {
      background: #f6f8fa;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .modal-body pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .modal-body h1,
    .modal-body h2,
    .modal-body h3 {
      margin-top: 20px;
    }

    /* ── Enrichment status pill ───────────────────────────── */

    .enrich-pill {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .enrich-ready {
      background: #dafbe1;
      color: var(--green);
    }

    .enrich-needed {
      background: #fff8c5;
      color: var(--yellow);
    }

    .enrich-none {
      background: #ffebe9;
      color: var(--red);
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div>
        <h1>Architecture Governance</h1>
        <p class="subtitle" style="margin-bottom:0">Index Confluence pages into governance categories, or ingest and
          validate with governance agents.</p>
      </div>
      <button onclick="resetAll()" class="btn-sm danger" style="white-space:nowrap;margin-top:4px"
        title="Remove all watched pages and delete output folders">Reset All</button>
    </div>

    <div class="add-form">
      <input type="text" id="pageId" placeholder="Confluence Page ID" />
      <select id="modeSelect" onchange="onModeChange()">
        <option value="validate" selected>Validate</option>
        <option value="index">Index</option>
      </select>
      <select id="categorySelect" class="hidden">
        <option value="patterns">patterns</option>
        <option value="standards">standards</option>
        <option value="security">security</option>
      </select>
      <button id="submitBtn" class="btn-validate" onclick="submitPage()">Validate Page</button>
    </div>

    <!-- ═══ INDEXES SECTION ═══ -->
    <div id="indexesSection"></div>

    <!-- ═══ VALIDATION SECTION ═══ -->
    <div id="validationSection"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modalTitle">Preview</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const API = '/api/pages';
    const CATEGORIES = ['patterns', 'standards', 'security'];
    const CAT_ICONS = { patterns: '\u{1F537}', standards: '\u{1F4CB}', security: '\u{1F512}' };
    const CAT_COLORS = {
      patterns: { bg: '#ddf4ff', text: '#0969da' },
      standards: { bg: '#fff8c5', text: '#9a6700' },
      security: { bg: '#f3e8ff', text: '#8250df' },
    };

    let _collapsed = {};

    function onModeChange() {
      const mode = document.getElementById('modeSelect').value;
      const catSelect = document.getElementById('categorySelect');
      const btn = document.getElementById('submitBtn');
      if (mode === 'validate') {
        catSelect.classList.add('hidden');
        btn.textContent = 'Validate Page';
        btn.classList.add('btn-validate');
      } else {
        catSelect.classList.remove('hidden');
        btn.textContent = 'Index Page';
        btn.classList.remove('btn-validate');
      }
    }

    // ── Utilities ──────────────────────────────────────────────────────

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function copyCmd(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 1200);
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────

    function openModal(title, html) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('modalBody').innerHTML = '';
    }

    async function viewPreview(pageId) {
      const res = await fetch(`/pages/${pageId}/preview`);
      if (!res.ok) { alert('Preview not available'); return; }
      openModal(`Page ${pageId} — Preview`, await res.text());
    }

    async function viewReport(pageId) {
      const res = await fetch(`/api/pages/${pageId}/report`);
      if (!res.ok) { alert('Report not available yet'); return; }
      openModal(`Page ${pageId} — Governance Report`, await res.text());
    }

    async function viewPageRules(pageId) {
      const res = await fetch(`/api/pages/${pageId}/rules`);
      if (!res.ok) { alert('Rules not available'); return; }
      openModal(`Page ${pageId} — Extracted Rules`, await res.text());
    }

    async function viewIndexRules(cat) {
      const res = await fetch(`/api/indexes/${cat}/rules`);
      if (!res.ok) { alert('Consolidated rules not available — run index preparation first'); return; }
      openModal(`${cat} — All Rules (_all.rules.md)`, await res.text());
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Progress log renderer ─────────────────────────────────────────

    function renderProgressLog(logs, isActive) {
      if (!logs || !logs.length) {
        if (isActive) {
          return '<div class="progress-log"><span class="log-spinner"></span> <span class="log-waiting">Waiting for agent to start...</span></div>';
        }
        return '';
      }

      const lastIdx = logs.length - 1;
      const lines = logs.map((l, i) => {
        const st = l.status || '';
        const isLast = i === lastIdx;
        const isRunning = isLast && isActive && st !== 'complete' && st !== 'error';

        let iconHtml = '';
        if (isRunning) {
          iconHtml = '<span class="log-spinner"></span>';
        } else if (st === 'complete') {
          iconHtml = '<span class="log-icon-complete">\u2713</span>';
        } else if (st === 'start' || st === 'running') {
          iconHtml = '<span class="log-icon-start">\u25B6</span>';
        } else if (st === 'error') {
          iconHtml = '<span class="log-icon-error">\u2717</span>';
        } else {
          iconHtml = '<span class="log-icon-start">\u2022</span>';
        }

        const agentName = l.agent || '';
        const isSubAgent = agentName && agentName !== 'governance-agent';
        let badgeHtml = '';
        if (agentName) {
          const badgeCls = agentName.includes('patterns') ? 'patterns'
            : agentName.includes('standards') ? 'standards'
              : agentName.includes('security') ? 'security' : 'governance';
          badgeHtml = `<span class="agent-badge ${badgeCls}">${agentName}</span>`;
        }

        const stepLabel = l.step !== undefined && l.step !== 'done' ? `Step ${l.step}: ` : '';
        const msg = l.message || '';
        const entryCls = isSubAgent ? 'log-entry sub-agent' : 'log-entry';

        let html = `<div class="${entryCls}">${iconHtml} ${badgeHtml}${stepLabel}${msg}</div>`;
        if (l.detail) {
          html += `<div class="log-detail${isSubAgent ? ' sub-agent' : ''}">${l.detail}</div>`;
        }
        if (l.output) {
          html += `<details class="log-output${isSubAgent ? ' sub-agent' : ''}"><summary>Show model output</summary>`;
          html += `<pre class="log-output-content">${escapeHtml(typeof l.output === 'string' ? l.output : JSON.stringify(l.output, null, 2))}</pre>`;
          html += `</details>`;
        }
        return html;
      }).join('');

      let tail = '';
      if (isActive) {
        const lastSt = logs[lastIdx].status || '';
        if (lastSt === 'complete' || lastSt === 'error') {
          tail = '<div class="log-entry log-tail"><span class="log-spinner"></span> <span style="color:var(--muted);font-size:0.85em">Working...</span></div>';
        }
      }

      return `<div class="progress-log" id="progressScroll">${lines}${tail}</div>`;
    }

    // ── Score card renderer ───────────────────────────────────────────

    function renderScoreCard(scores) {
      if (!scores) return '';
      const overall = scores.score || 0;
      const cls = overall >= 70 ? 'score-pass' : 'score-fail';
      let pills = '';
      if (scores.patterns !== undefined)
        pills += `<span class="score-pill" style="background:#ddf4ff;color:var(--accent)">Patterns: ${scores.patterns}</span>`;
      if (scores.standards !== undefined)
        pills += `<span class="score-pill" style="background:#fff8c5;color:var(--yellow)">Standards: ${scores.standards}</span>`;
      if (scores.security !== undefined)
        pills += `<span class="score-pill" style="background:#f3e8ff;color:var(--purple)">Security: ${scores.security}</span>`;
      return `<div class="score-card">
        <span class="score-overall ${cls}">${overall}/100 ${overall >= 70 ? 'PASS' : 'FAIL'}</span>
        <div class="score-pills">${pills}</div>
      </div>`;
    }

    // ── Rules summary badges ──────────────────────────────────────────

    function renderRulesBadges(rs) {
      if (!rs) return '';
      let html = `<span class="label" style="cursor:pointer">Rules: ${rs.total}</span>`;
      if (rs.severity) {
        const s = rs.severity;
        if (s.C) html += `<span class="rules-badge sev-C">C:${s.C}</span>`;
        if (s.H) html += `<span class="rules-badge sev-H">H:${s.H}</span>`;
        if (s.M) html += `<span class="rules-badge sev-M">M:${s.M}</span>`;
        if (s.L) html += `<span class="rules-badge sev-L">L:${s.L}</span>`;
      }
      return html;
    }

    // ══════════════════════════════════════════════════════════════════
    // INDEXES SECTION RENDERER
    // ══════════════════════════════════════════════════════════════════

    function renderIndexesSection(pages, indexes) {
      const catPages = {};
      CATEGORIES.forEach(c => catPages[c] = []);
      Object.values(pages).forEach(p => {
        if (p.mode === 'index' && p.index && catPages[p.index]) {
          catPages[p.index].push(p);
        }
      });

      const hasAnyIndexPages = CATEGORIES.some(c => catPages[c].length > 0);
      if (!hasAnyIndexPages) {
        return `<div class="section-header"><span class="section-title">Indexes</span></div>
                <div class="section-empty">No indexed pages yet. Add a page with mode "Index" above.</div>`;
      }

      let html = `<div class="section-header">
        <span class="section-title">Indexes</span>
        <span class="cmd" onclick="copyCmd(this)" title="Click to copy" style="margin:0">@governance-agent Prepare all indexes</span>
      </div>`;

      CATEGORIES.forEach(cat => {
        const cp = catPages[cat];
        if (!cp.length) return;

        const idxInfo = (indexes && indexes[cat]) || {};
        const isCollapsed = _collapsed[cat] === true;

        // Aggregate stats
        let totalRules = 0;
        let pagesNeedLlm = 0;
        let allEnriched = true;
        let anyChanged = false;

        cp.forEach(p => {
          const rc = (p.rules_summary && p.rules_summary.total) || p.rules_count || 0;
          totalRules += rc;
          if (!p.llm_rules_at) pagesNeedLlm++;
          if (!p.enriched_at) allEnriched = false;
          if (p.change_detected) anyChanged = true;
        });

        const enrichLabel = allEnriched && totalRules > 0
          ? '<span class="enrich-pill enrich-ready">enriched</span>'
          : pagesNeedLlm > 0
            ? `<span class="enrich-pill enrich-needed">LLM needed: ${pagesNeedLlm} page${pagesNeedLlm > 1 ? 's' : ''}</span>`
            : '<span class="enrich-pill enrich-needed">enrichment needed</span>';

        const indexProgress = idxInfo.progress_log || [];
        const indexDone = idxInfo.status === 'prepared' || (indexProgress.length > 0 && indexProgress.some(l =>
          l.step === 'done'
          || (String(l.step || '').startsWith('I-4') && l.status === 'complete')
          || (String(l.message || '').toLowerCase().includes('enrichment') && l.status === 'complete')
          || (String(l.message || '').toLowerCase().includes('index preparation') && l.status === 'complete')
        ));
        const isPreparing = indexProgress.length > 0 && !indexDone;

        const colors = CAT_COLORS[cat];

        html += `<div class="cat-card">`;
        const prepCmd = `@governance-agent Prepare index ${cat}`;
        html += `<div class="cat-header" onclick="toggleCat('${cat}')">
          <span class="cat-name">
            <span class="cat-icon">${CAT_ICONS[cat]}</span>
            ${cat}
            <span style="font-weight:400;font-size:0.82rem;color:var(--muted)">${cp.length} page${cp.length > 1 ? 's' : ''} &middot; ${totalRules} rules</span>
            ${enrichLabel}
            ${anyChanged ? '<span class="enrich-pill enrich-needed">page changes detected</span>' : ''}
          </span>
          <span class="cat-stats">
            <span class="cmd" onclick="event.stopPropagation();copyCmd(this)" title="Click to copy" style="margin:0">${prepCmd}</span>
            ${totalRules > 0 ? `<button class="btn-sm accent" onclick="event.stopPropagation();viewIndexRules('${cat}')">All Rules</button>` : ''}
            <span style="font-size:0.9rem;color:var(--muted)">${isCollapsed ? '\u25B6' : '\u25BC'}</span>
          </span>
        </div>`;

        const forceOpen = isPreparing || (indexProgress.length > 0 && !indexDone);
        html += `<div class="cat-body${isCollapsed && !forceOpen ? ' collapsed' : ''}">`;

        // (Toolbar moved to cat-header)

        // Per-page rows
        cp.forEach(p => {
          const st = p.status || 'pending';
          const hasRules = p.rules_summary && p.rules_summary.total > 0;
          const hasLlm = !!p.llm_rules_at;
          const canPreview = ['ingested', 'validating', 'validated'].includes(st);

          html += `<div class="page-row">`;
          html += `<span class="page-id">${p.page_id}</span>`;
          html += `<span class="page-title">${p.title || '\u2014'}</span>`;

          html += `<span class="page-meta">`;
          html += `<span class="status status-${st}">${(st === 'ingesting') ? '<span class="status-spinner"></span>' : ''}${st}</span>`;

          if (hasRules) {
            html += `<a href="#" onclick="event.preventDefault();viewPageRules('${p.page_id}')" style="text-decoration:none">${renderRulesBadges(p.rules_summary)}</a>`;
          } else if (p.rules_count > 0) {
            html += `<a href="#" onclick="event.preventDefault();viewPageRules('${p.page_id}')" style="text-decoration:none"><span class="label">Rules: ${p.rules_count}</span></a>`;
          }

          if (hasLlm) {
            html += `<span class="rules-badge" style="background:#dafbe1;color:#1a7f37">LLM \u2713</span>`;
          } else if (st === 'ingested') {
            html += `<span class="rules-badge" style="background:#fff8c5;color:#9a6700">LLM needed</span>`;
          }

          if (p.change_detected) {
            html += `<span class="rules-badge" style="background:#fff8c5;color:#9a6700">\u26A0 changed</span>`;
          }

          if (p.error) {
            html += `<span class="error-msg">${p.error}</span>`;
          }
          html += `</span>`;

          html += `<span class="page-actions">`;
          if (canPreview) html += `<button class="btn-sm" onclick="viewPreview('${p.page_id}')">Preview</button>`;
          if (hasRules || hasLlm) html += `<button class="btn-sm" onclick="viewPageRules('${p.page_id}')">Rules</button>`;

          const showMarkReady = st === 'pending' || (p.change_detected && st === 'ingested');
          if (showMarkReady) html += `<button class="btn-sm" style="color:var(--yellow);border-color:var(--yellow)" onclick="markReady('${p.page_id}')">Mark Ready</button>`;
          if (['ingested', 'error'].includes(st)) html += `<button class="btn-sm" onclick="ingestPage('${p.page_id}')">Re-index</button>`;
          html += `<button class="btn-sm danger" onclick="removePage('${p.page_id}')">Remove</button>`;
          html += `</span>`;

          html += `</div>`;
        });

        // Index preparation progress log
        if (indexProgress.length > 0 || isPreparing) {
          html += `<div style="padding:8px 18px 14px">`;
          html += `<span class="label">Index Preparation Progress</span>`;
          html += renderProgressLog(indexProgress, isPreparing);
          html += `</div>`;
        }

        html += `</div>`; // cat-body
        html += `</div>`; // cat-card
      });

      return html;
    }

    // ══════════════════════════════════════════════════════════════════
    // VALIDATION SECTION RENDERER
    // ══════════════════════════════════════════════════════════════════

    function renderValidationSection(pages) {
      const valPages = Object.values(pages).filter(p => p.mode === 'validate');

      if (!valPages.length) {
        return `<div class="section-header"><span class="section-title">Validation</span></div>
                <div class="section-empty">No validation pages yet. Add a page with mode "Validate" above.</div>`;
      }

      let html = `<div class="section-header"><span class="section-title">Validation</span></div>`;

      valPages.forEach(p => {
        const st = p.status || 'pending';
        const cmd = `@governance-agent Validate Confluence page ${p.page_id}`;
        const canPreview = ['ingested', 'validating', 'validated'].includes(st);

        html += `<div class="val-card">`;
        html += `<div class="val-header">`;
        html += `<span style="display:flex;gap:10px;align-items:center">`;
        html += `<code style="font-size:0.85rem">${p.page_id}</code>`;
        html += `<span style="font-weight:500">${p.title || '\u2014'}</span>`;
        html += `<span class="status status-${st}">${(st === 'validating' || st === 'ingesting') ? '<span class="status-spinner"></span>' : ''}${st}</span>`;
        html += `</span>`;

        html += `<span style="display:flex;gap:5px">`;
        if (canPreview) html += `<button class="btn-sm" onclick="viewPreview('${p.page_id}')">Preview</button>`;
        if (st === 'validated') html += `<button class="btn-sm purple" onclick="viewReport('${p.page_id}')">Report</button>`;
        const showMarkReady = st === 'pending' || (p.change_detected && ['ingested', 'validated'].includes(st));
        if (showMarkReady) html += `<button class="btn-sm" style="color:var(--yellow);border-color:var(--yellow)" onclick="markReady('${p.page_id}')">Mark Ready</button>`;
        if (['ingested', 'error', 'validated'].includes(st)) html += `<button class="btn-sm" onclick="ingestPage('${p.page_id}')">Re-ingest</button>`;
        html += `<button class="btn-sm danger" onclick="removePage('${p.page_id}')">Remove</button>`;
        html += `</span>`;
        html += `</div>`; // val-header

        html += `<div class="val-body">`;

        if (p.error) {
          html += `<div class="error-msg">${p.error}</div>`;
        }

        if (p.change_detected) {
          html += `<div class="stale-banner"><span>\u26A0</span> Page changed on Confluence — add <code>governance-ready</code> label or click Mark Ready to re-ingest</div>`;
        } else if (p.stale_validation) {
          html += `<div class="stale-banner"><span>\u26A0</span> Page re-ingested after Confluence update — please re-run governance agent</div>`;
        }

        if (st === 'validated') {
          html += renderScoreCard(p.report_scores);
          html += `<div style="margin-top:10px"><span class="label">Re-validate in VS Code Chat:</span><br>`;
          html += `<span class="cmd" onclick="copyCmd(this)" title="Click to copy">${cmd}</span></div>`;
          html += renderProgressLog(p.progress_log, false);
        } else if (st === 'validating') {
          html += `<div><span class="label">Running in VS Code Chat:</span> `;
          html += `<span class="cmd" onclick="copyCmd(this)" title="Click to copy">${cmd}</span></div>`;
          html += renderProgressLog(p.progress_log, true);
        } else if (st === 'ingested') {
          html += `<div><span class="label">Page ingested to</span> <span style="font-family:'SF Mono',Consolas,monospace;font-size:0.78rem;color:var(--green)">${p.output_path || 'governance/output/' + p.page_id + '/'}</span></div>`;
          html += `<div style="margin-top:8px"><span class="label">Run in VS Code Chat:</span><br>`;
          html += `<span class="cmd" onclick="copyCmd(this)" title="Click to copy">${cmd}</span></div>`;
        } else if (st === 'pending') {
          html += `<span style="color:var(--muted)">Waiting for <code>governance-ready</code> label to start ingestion\u2026</span>`;
        }

        html += `</div>`; // val-body
        html += `</div>`; // val-card
      });

      return html;
    }

    // ── Main render ───────────────────────────────────────────────────

    function renderAll(data) {
      const pages = data.pages || data;
      const indexes = data.indexes || {};
      document.getElementById('indexesSection').innerHTML = renderIndexesSection(pages, indexes);
      document.getElementById('validationSection').innerHTML = renderValidationSection(pages);

      document.querySelectorAll('.progress-log').forEach(el => {
        el.scrollTop = el.scrollHeight;
      });
    }

    function toggleCat(cat) {
      _collapsed[cat] = !_collapsed[cat];
      if (_lastData) renderAll(_lastData);
    }

    // ── Actions ───────────────────────────────────────────────────────

    let _lastData = null;

    async function submitPage() {
      const pageId = document.getElementById('pageId').value.trim();
      if (!pageId) return;
      const mode = document.getElementById('modeSelect').value;
      const category = document.getElementById('categorySelect').value;
      const body = { page_id: pageId, mode };
      if (mode === 'index') body.index = category;
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        alert(err.detail || 'Failed to add page');
        return;
      }
      document.getElementById('pageId').value = '';
    }

    async function removePage(pageId) {
      await fetch(`${API}/${pageId}`, { method: 'DELETE' });
    }

    async function resetAll() {
      if (!confirm('Remove all watched pages and clean output folders?\n\nThis cannot be undone.')) return;
      await fetch(API, { method: 'DELETE' });
    }

    async function ingestPage(pageId) {
      await fetch(`${API}/${pageId}/ingest`, { method: 'POST' });
    }

    async function markReady(pageId) {
      const res = await fetch(`${API}/${pageId}/mark-ready`, { method: 'POST' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.detail || 'Could not add label');
      }
    }

    // ── SSE — Server-Sent Events ──────────────────────────────────────

    let _sseAlive = 0;

    function connectSSE() {
      const source = new EventSource('/api/events');
      source.onmessage = (event) => {
        _sseAlive = Date.now();
        try {
          const data = JSON.parse(event.data);
          _lastData = data;
          renderAll(data);
        } catch (e) { }
      };
      source.onerror = () => {
        source.close();
        setTimeout(connectSSE, 3000);
      };
    }

    function pollFallback() {
      const stale = Date.now() - _sseAlive > 20000;
      if (stale) {
        fetch(API).then(r => r.json()).then(d => { _lastData = d; renderAll(d); }).catch(() => { });
      }
    }

    document.getElementById('modeSelect').value = 'validate';
    onModeChange();

    fetch(API).then(r => r.json()).then(d => { _lastData = d; renderAll(d); }).catch(() => { });
    connectSSE();
    setInterval(pollFallback, 15000);
  </script>
</body>
